include:
  - ./core-services/user-service/docker-compose.yaml
  - ./core-services/ticket-service/docker-compose.yaml
  - ./core-services/cinema-management-service/docker-compose.yaml
  - ./core-services/payment-service/docker-compose.yaml
  - ./core-services/product-service/docker-compose.yaml
  - ./core-services/order-service/docker-compose.yaml
  - ./infrastructure/eureka-server/docker-compose.yaml
  - ./infrastructure/config-server/docker-compose.yaml
  - ./infrastructure/api-gateway/docker-compose.yaml
  - ./support-services/notification-service/docker-compose.yaml
  - ./support-services/ai-service/docker-compose.yaml

services:
  mysql-db:
    image: mysql:8.0
    container_name: alpha-mysql
    ports:
      - "3305:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d # Tự động tạo user_db, ticket_db...
      - alpha_mysql_data:/var/lib/mysql
    networks:
      - alpha_network

  redis:
    image: redis:7
    container_name: alpha-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - alpha_redis_data:/data
    networks:
      - alpha_network
  ai-postgres:
    image: pgvector/pgvector:pg16
    container_name: alpha-ai-postgres
    ports:
      - "${AI_POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${AI_POSTGRES_DB}
      POSTGRES_USER: ${AI_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AI_POSTGRES_PASSWORD}
    restart: always
    volumes:
      - alpha_ai_postgres_data:/var/lib/postgresql/data
    networks:
      - alpha_network
  kafka:
    image: apache/kafka:4.0.2
    container_name: alpha-kafka
    ports:
      - "${KAFKA_PORT}:9092"
      - "9094:9094" # Port dành cho máy Local (IDE) gọi vào
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@alpha-kafka:9093

      # Khai báo 2 listener: INTERNAL (cho Docker) và EXTERNAL (cho máy Local)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093

      # Định nghĩa địa chỉ mà Kafka sẽ quảng bá ra ngoài
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://alpha-kafka:9092,EXTERNAL://localhost:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Cấu hình để tránh lỗi "Node 1 disconnected" do timeout
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - alpha_kafka_data:/var/lib/kafka/data
    networks:
      - alpha_network

volumes:
  alpha_redis_data:
  alpha_ai_postgres_data:
  alpha_kafka_data:
    # alpha_mysql_data:

networks:
  alpha_network:
    name: alpha_network
    driver: bridge
