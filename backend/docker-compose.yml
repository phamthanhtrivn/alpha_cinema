services:
  redis:
    image: redis:7
    container_name: alpha-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    volumes:
      - alpha_redis_data:/data
    networks:
      - alpha_network
  kafka:
    image: apache/kafka:4.0.2
    container_name: alpha-kafka
    ports:
      - "${KAFKA_PORT}:9092"
      - "9094:9094" # Port dành cho máy Local (IDE) gọi vào
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@alpha-kafka:9093
      
      # Khai báo 2 listener: INTERNAL (cho Docker) và EXTERNAL (cho máy Local)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      
      # Định nghĩa địa chỉ mà Kafka sẽ quảng bá ra ngoài
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://alpha-kafka:9092,EXTERNAL://localhost:9094
      
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      
      # Cấu hình để tránh lỗi "Node 1 disconnected" do timeout
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - alpha_kafka_data:/var/lib/kafka/data
    networks: 
      - alpha_network


volumes:
  alpha_redis_data:
  alpha_kafka_data:

networks:
  alpha_network:
    driver: bridge