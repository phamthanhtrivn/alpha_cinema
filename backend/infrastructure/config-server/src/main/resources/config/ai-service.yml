server:
  port: 8088

spring:
  datasource:
    url: jdbc:postgresql://${AI_POSTGRES_HOST}:${AI_POSTGRES_PORT}/${AI_POSTGRES_DB}
    username: ${AI_POSTGRES_USER}
    password: ${AI_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 6000ms
      connect-timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: "review_moderation_result_event:com.movieticket.ai.event.model.ReviewModerationResultEvent"
    consumer:
      group-id: ai-service-group
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: true
        spring.json.trusted.packages: "com.movieticket.*"
        spring.json.type.mapping: > 
          review_moderation_event:com.movieticket.ai.event.model.ReviewModerationEvent
  ai:
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY}
        chat:
          options:
            model: ${GOOGLE_AI_MODEL}
        embedding:
          api-key: ${GOOGLE_AI_API_KEY}
          text:
            options:
              model: ${GOOGLE_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 3072
        table-name: ai_knowledge_documents
        initialize-schema: false

ai:
  tool:
    timeout-ms: ${AI_TOOL_TIMEOUT_MS:3000}

external-services:
  movie-service:
    base-url: ${MOVIE_SERVICE_BASE_URL}
  cinema-service:
    base-url: ${CINEMA_SERVICE_BASE_URL}
  user-service:
    base-url: ${USER_SERVICE_BASE_URL}
  order-service:
    base-url: ${ORDER_SERVICE_BASE_URL}
  ticket-service:
    base-url: ${TICKET_SERVICE_BASE_URL}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true

---
spring:
  config:
    activate:
      on-profile: prod

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EC2_PUBLIC_IP}
