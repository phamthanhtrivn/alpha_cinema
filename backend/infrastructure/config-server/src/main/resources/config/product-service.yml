server:
  port: 8084

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/alpha_product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Tự động cập nhật bảng trong DB khi code Entity thay đổi (phù hợp lúc dev)
      ddl-auto: update
    # Hiển thị câu lệnh SQL thực thi dưới log để dễ debug
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dùng MySQLDialect để Hibernate biết cách sinh SQL phù hợp với MySQL
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 6000ms
      connect-timeout: 2000ms
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT}
    consumer:
      group-id: product-service
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: true
        spring.json.trusted.packages: "com.movieticket.*"
        spring.json.type.mapping: > 
          movie_rating_update_event:com.movieticket.product.event.model.MovieRatingUpdateEvent,
          order_event:com.movieticket.product.event.model.OrderSuccessfulEvent

eureka:
  client:
    service-url:
      # Nơi đăng ký với Eureka Server với tên là product-service
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

external-services:
  cinema-service: 
    base-url: ${CINEMA_SERVICE_BASE_URL}
  order-service:
    base-url: ${ORDER_SERVICE_BASE_URL}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/alpha_product_db?sslMode=REQUIRED&serverTimezone=Asia/Ho_Chi_Minh

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EC2_PUBLIC_IP}
