server:
  port: 8083

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3305}/alpha_payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # Tự động cập nhật bảng trong DB khi code Entity thay đổi (phù hợp lúc dev)
      ddl-auto: update
    # Hiển thị câu lệnh SQL thực thi dưới log để dễ debug
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dùng MySQLDialect để Hibernate biết cách sinh SQL phù hợp với MySQL
        dialect: org.hibernate.dialect.MySQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        spring.json.type.mapping: > 
          payment_result_event:com.movieticket.payment.event.model.PaymentResultEvent,
          payment-result-cash-events:com.movieticket.payment.event.model.PaymentResultEvent
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: true
        spring.json.trusted.packages: "com.movieticket.*"
        spring.json.type.mapping: > 
          payment-by-cash-requests:com.movieticket.payment.event.model.PaymentByCashRequestEvent



eureka:
  client:
    service-url:
      # Nơi đăng ký với Eureka Server với tên là payment-service
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true

# VNPay (sandbox)
vnpay:
  tmnCode: ${VNPAY_TMN_CODE}
  hashSecret: ${VNPAY_HASH_SECRET}
  paymentUrl: ${VNPAY_PAYMENT_URL}
  returnUrl: ${BACKEND_BASE_URL}/api/payments/vn-pay-callback
  version: ${VNPAY_VERSION}
  command: ${VNPAY_COMMAND}
  orderType: ${VNPAY_ORDER_TYPE}

momo:
  partner-code: ${MOMO_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY}
  end-point: ${MOMO_END_POINT}
  return-url: ${BACKEND_BASE_URL}/api/payments/momo-pay-callback
  request-type: ${MOMO_REQUEST_TYPE}

payment:
  backend-base-url: ${BACKEND_BASE_URL}
  frontend-base-url: ${FRONTEND_BASE_URL}
