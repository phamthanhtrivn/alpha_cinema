# API Gateway là cổng vào của hệ thống
# Nơi người dùng truy cập vào hệ thống
# API Gateway sẽ là nơi định tuyến các request đến các microservice khác

server:
  port: 8080 # Port chạy của API Gateway, người dùng sẽ truy cập qua port này

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 6000ms
      connect-timeout: 2000ms
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userOrIpKeyResolver}"
            redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_REPLENISH_RATE}
            redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST_CAPACITY}
            redis-rate-limiter.requestedTokens: ${GATEWAY_RATE_LIMIT_REQUESTED_TOKENS}
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
               - "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          # Cho phép Gateway tự động tìm các service đã đăng ký với Eureka
          enabled: true
          lower-case-service-id: true
      routes:
        # Route cho dịch vụ quản lý rạp phim
        - id: cinema-management-service
          uri: lb://cinema-management-service # lb:// nghĩa là Load Balanced (sẽ tìm service qua Eureka)
          predicates: # Điều kiện để route này được kích hoạt, ở đây là khi URL bắt đầu bằng /api/cinemas/**
            - Path=/api/cinemas/**, /api/rooms/**, /api/seats/**, /api/seat-types/**
        # Route cho dịch vụ quản lý giá/vé
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/api/tickets/**, /api/holidays/**
        # Route cho dịch vụ quản lý người dùng
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/customers/**, /api/employees/**, /api/reviews/**
        # Route cho dịch vụ quản lý sản phẩm (suất chiếu, phim, combo,...)
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**, /api/artists/**, /api/movies/**, /api/show-schedules/**
        # Route cho dịch vụ quản lý đơn hàng
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**, /api/promotions/**, /api/show-schedule-details/**, /api/checkouts/**, /api/dashboard/**
        # Route cho dịch vụ thanh toán
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
        # Route thông báo
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**, /ws/**
        # Route chat
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
eureka:
  client:
    service-url:
      # Địa chỉ để Gateway đăng ký và lấy danh sách các microservice từ Eureka
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    # Thời gian để client cố gắng đăng ký lại với Eureka nếu lần đầu thất bại
    registry-fetch-interval-seconds: 5
logging:
  level:
    # Đặt mức log cho các package liên quan đến Gateway và Netty để dễ dàng debug khi có lỗi
    org.springframework.cloud.gateway: DEBUG
    # Đặt mức log cho Netty (thư viện HTTP client mà Gateway sử dụng) để xem chi tiết các request và response HTTP, giúp debug khi có lỗi liên quan đến giao tiếp giữa Gateway và các microservice
    reactor.netty.http.client: DEBUG
rsa:
  private-key-path: ${RSA_PRIVATE_PATH}
  public-key-path: ${RSA_PUBLIC_PATH}

---
spring:
  config:
    activate:
      on-profile: prod

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EC2_PUBLIC_IP}

