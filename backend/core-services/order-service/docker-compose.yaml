services:
  order-service:
    build:
      context: ../..
      dockerfile: core-services/order-service/Dockerfile
    container_name: order-service
    env_file:
      - ./.env
    ports:
      - "8082:8082"
    restart: always
    depends_on:
      - mysql-db
      - config-server
      - eureka-server
    networks:
      - alpha_network
