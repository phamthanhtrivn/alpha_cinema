services:
  ticket-service:
    build:
      context: ../..
      dockerfile: core-services/ticket-service/Dockerfile
    container_name: ticket-service
    env_file:
      - ./.env.docker
    ports:
      - "8085:8085"
    restart: always
    depends_on:
      - mysql-db
      - config-server
      - eureka-server
    networks:
      - alpha_network
