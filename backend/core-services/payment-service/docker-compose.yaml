services:
  payment-service:
    build:
      context: ../..
      dockerfile: core-services/payment-service/Dockerfile
    container_name: payment-service
    env_file:
      - ./.env.docker
    ports:
      - "8083:8083"
    restart: always
    depends_on:
      - mysql-db
      - config-server
      - eureka-server
    networks:
      - alpha_network
