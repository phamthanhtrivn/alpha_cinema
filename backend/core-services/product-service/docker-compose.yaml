services:
  product-service:
    build:
      context: ../..
      dockerfile: core-services/product-service/Dockerfile
    container_name: product-service
    env_file:
      - ./.env
    ports:
      - "8084:8084"
    restart: always
    depends_on:
      - mysql-db
      - config-server
      - eureka-server
    networks:
      - alpha_network
