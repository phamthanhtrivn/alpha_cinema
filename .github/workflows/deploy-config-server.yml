name: Deploy Config Server

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'backend/infrastructure/config-server/**'
      - 'backend/docker-compose.prod.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/infrastructure/config-server/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/config-server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Copy docker-compose.prod.yml to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.CONFIG_SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_INFRASTRUCTURE }}
        source: "backend/docker-compose.prod.yml"
        target: "/home/ubuntu/alpha_cinema"
        
    - name: Deploy Docker Container on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.CONFIG_SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_INFRASTRUCTURE }}
        script: |
          cd /home/ubuntu/alpha_cinema/backend
          sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          sudo docker compose -f docker-compose.prod.yml stop config-server || true
          sudo docker compose -f docker-compose.prod.yml rm -f config-server || true
          sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/config-server:latest || true
          sudo docker compose -f docker-compose.prod.yml pull config-server
          sudo docker compose -f docker-compose.prod.yml up -d config-server