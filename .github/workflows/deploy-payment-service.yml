name: Deploy Payment Service

on:
  push:
    branches: [ "develop" ]
    paths:
      - 'backend/core-services/payment-service/**'
      - 'backend/docker-compose.prod.yml' # Bồi thêm file compose tổng

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/core-services/payment-service/Dockerfile
        push: true
        # Dùng biến cho đồng bộ tài khoản Docker Hub
        tags: ${{ secrets.DOCKER_USERNAME }}/payment-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Copy docker-compose.prod.yml to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.CORE_SERVICE_1 }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_CORE_SERVICES }}
        source: "backend/docker-compose.prod.yml"
        target: "/home/ubuntu/alpha_cinema"
        
    - name: Deploy Docker Container on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.CORE_SERVICE_1 }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_CORE_SERVICES }}
        script: |
          cd /home/ubuntu/alpha_cinema/backend
          
          # Đăng nhập Docker Hub
          sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          
          # Dọn dẹp container và image cũ
          sudo docker compose -f docker-compose.prod.yml stop payment-service || true
          sudo docker compose -f docker-compose.prod.yml rm -f payment-service || true
          sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/payment-service:latest || true
          
          # Kéo bản mới và khởi chạy ngầm
          sudo docker compose -f docker-compose.prod.yml pull payment-service
          sudo docker compose -f docker-compose.prod.yml up -d payment-service
