name: Deploy API Gateway

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/infrastructure/api-gateway/**'
      - 'backend/docker-compose.prod.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/infrastructure/api-gateway/**'
      - 'backend/docker-compose.prod.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: maven

    - name: Run Maven Tests
      run: mvn -B -f backend/infrastructure/api-gateway/pom.xml clean test

    - name: Validate Production Compose
      run: |
        touch backend/.env
        docker compose -f backend/docker-compose.prod.yml config --quiet

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/infrastructure/api-gateway/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Copy docker-compose.prod.yml and Caddyfile to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.API_GATEWAY_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_INFRASTRUCTURE }}
        source: "backend/docker-compose.prod.yml,backend/Caddyfile"
        target: "/home/ubuntu/alpha_cinema"
        
    - name: Deploy Docker Container on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.API_GATEWAY_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_INFRASTRUCTURE }}
        script: |
          cd /home/ubuntu/alpha_cinema/backend
          sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          sudo docker compose -f docker-compose.prod.yml stop api-gateway || true
          sudo docker compose -f docker-compose.prod.yml rm -f api-gateway || true
          sudo docker rmi ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest || true
          sudo docker compose -f docker-compose.prod.yml pull api-gateway caddy
          sudo docker compose -f docker-compose.prod.yml up -d api-gateway caddy

  smoke-test:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Verify API Gateway Container
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.API_GATEWAY_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY_INFRASTRUCTURE }}
        script: |
          for attempt in $(seq 1 24); do
            if [ "$(sudo docker inspect -f '{{.State.Running}}' api-gateway 2>/dev/null)" = "true" ] \
              && curl -sS --connect-timeout 2 -o /dev/null "http://127.0.0.1:8080/" \
              && curl -fsS -H 'Accept: application/json' "http://${{ secrets.EURUKA_SERVER_IP }}:8761/eureka/apps/API-GATEWAY" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              echo "API Gateway container is healthy."
              exit 0
            fi
            sleep 5
          done
          sudo docker ps -a --filter name=api-gateway
          sudo docker logs --tail 100 api-gateway || true
          exit 1

    - name: Verify Public API
      run: |
        for attempt in $(seq 1 24); do
          if curl -fsS "https://alphacinema.duckdns.org/api/movies/public?page=0&size=1" > /dev/null; then
            echo "Public API is healthy."
            exit 0
          fi
          sleep 5
        done
        exit 1

